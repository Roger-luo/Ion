[package]
name = "ion"
version = "0.1.5"
edition = "2024"

[dependencies]
anyhow = "1"
clap = { version = "4.5.60", features = ["string", "derive"] }
clap_complete = "4"
dirs = "6"
crossterm = "0.28"
env_logger = "0.11"
log = "0.4"
ion-skill = { path = "crates/ion-skill" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
pathdiff = "0.2"
toml_edit = "0.22"
ratatui = "0.29"
tempfile = "3"

[dev-dependencies]

[workspace]
members = [".", "crates/ion-skill"]
