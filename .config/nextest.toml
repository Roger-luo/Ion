[profile.default]
# Run with up to all available CPUs
test-threads = "num-cpus"
# Fail fast on first failure
fail-fast = true
# Timeout per test (integration tests may clone repos)
slow-timeout = { period = "60s", terminate-after = 3 }

[profile.ci]
# CI-specific overrides
fail-fast = false
# Retry flaky tests once in CI
retries = 1
